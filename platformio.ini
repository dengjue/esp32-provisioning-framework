; PlatformIO project file — optional; Arduino IDE works without this file.
; Default board targets ESP32-S3 (GPIO 48 NeoPixel). Change board if needed.

[platformio]
src_dir = .

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter =
    +<esp32-provisioning-framework.ino>
    +<src/>
    -<.workbuddy/>
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter =
    +<esp32-provisioning-framework.ino>
    +<src/>
    -<.workbuddy/>
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -DLED_PIN=2
